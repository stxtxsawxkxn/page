<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ark</title>


<style>
html,
body {
  margin: 0;
  width: 100%;
  height: 100%;
  background: #000;
  overflow: hidden;
}
    /* 우클릭 금지 */
    img {
  -webkit-user-select: none;
  user-select: none;
  -webkit-touch-callout: none;
  pointer-events: none;
}
.top-bar {
  position: fixed;
  top: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 700px;
  z-index: 100;
  background: #000;
}

.top-bar img {
  width: 100%;
  display: block;
  margin-bottom: -2px;
}

.chat-scroll {
  height: 100dvh;
  overflow-y: auto;
  width: 100%;
  max-width: 700px;
  margin: 0 auto;
  background: #000;
  padding-top: min(13.72vw, 68.6px);
  margin-top: -1px;
  box-sizing: border-box;
  line-height: 0;
  font-size: 0;
}

.chat-scroll img {
  width: 100%;
  height: auto;
  display: block;
  margin: 0;
  padding: 0;
  border: 0;
}
.chat-scroll::-webkit-scrollbar {
  display: none;
}
  
</style>
</head>

<body>

  <div class="top-bar">
    <img src="ARK_0_0.png">
  </div>

  <div class="chat-scroll">

    <img src="ARK_0_1.png">
  </div>

</body>
</html>
