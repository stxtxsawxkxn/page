<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>chat</title>


<style>
html,
html,
body {
  margin: 0;
  width: 100%;
  height: 100%;
  background: #151515;
  overflow: hidden;
}

.top-bar {
  position: fixed;
  top: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 500px;
  z-index: 100;
  background: #151515;
}

.top-bar img {
  width: 100%;
  display: block;
}

.chat-scroll {
  height: 100dvh;
  overflow-y: auto;
  width: 100%;
  max-width: 500px;
  margin: 0 auto;
  background: #151515;
  padding-top: min(13.72vw, 68.6px);
  box-sizing: border-box;
  line-height: 0;
  font-size: 0;
}

.chat-scroll img {
  width: 100%;
  height: auto;
  display: block;
  margin: 0;
  padding: 0;
  border: 0;
}
  line-height: 0;
font-size: 0;
display: block;
</style>
</head>

<body>

  <div class="top-bar">
    <img src="MICHAEL_000.png">
  </div>

  <div class="chat-scroll">

    <img src="MICHAEL_001.png">
  </div>

</body>
</html>
